name: CI / Build / Publish

on:
  push:
    branches: [main]
    tags: ["*"]
  workflow_dispatch: {}

jobs:
  test:
    name: Test Python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade uv

      - name: Install project and test deps (via uv)
        run: |
          set -e
          python -m pip install --upgrade pip
          python -m pip install --upgrade uv
          # Create or update lockfile if present; non-fatal
          uv lock
          # Sync installs packages into the project environment
          uv sync

      - name: Run tests (via uv)
        run: uv run pytest -q

      - name: "Integration test: run example"
        run: |
          set -e
          cd example
          PORT=1337 uv run main.py --host=localhost

  publish:
    name: Build and Publish (single runner)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # IMPORTANT: this permission is mandatory for trusted publishing
    needs: test
    # only run publish once (not per-matrix) after tests succeed
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade uv

      - name: Determine version
        id: version
        run: |
          set -e
          echo "GITHUB_REF=${GITHUB_REF}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            # strip a leading 'v' if present
            TAG=${TAG#v}
            echo "version=$TAG" >> "$GITHUB_OUTPUT"
            echo "tagged=true" >> "$GITHUB_OUTPUT"
          else
            # Ensure we have full history and tags so `git describe` can find the latest tag.
            # If the checkout was shallow, try to unshallow; ignore failures and continue to fetch tags.
            git fetch --prune --unshallow || true
            git fetch --tags --prune || true
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
            # strip leading 'v' from latest tag if present
            LATEST_TAG=${LATEST_TAG#v}
            # Use a PEP 440-compliant dev version: <base>.dev<epoch>
            # epoch seconds ensures uniqueness and is numeric (allowed in devN)
            EPOCH=$(date +%s)
            DEV_VERSION="${LATEST_TAG}.dev${EPOCH}"
            echo "version=$DEV_VERSION" >> "$GITHUB_OUTPUT"
            echo "tagged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch pyproject.toml version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Patching pyproject.toml to version=${VERSION}"
          sed -E -i.bak "s/^version[[:space:]]*=[[:space:]]*\".*\"/version = \"${VERSION}\"/" pyproject.toml
          echo "Patched pyproject.toml:"
          sed -n '1,120p' pyproject.toml

      - name: Build distribution (via uv)
        run: uv build

      - name: Publish to TestPyPI (via pypa/gh-action-pypi-publish)
        if: steps.version.outputs.tagged == 'false'
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          # Publish built distributions from the 'dist' directory to TestPyPI.
          # Role-based auth (OIDC / trusted publisher) will be used if configured.
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist

      - name: Publish to PyPI (via pypa/gh-action-pypi-publish)
        if: steps.version.outputs.tagged == 'true'
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          # Publish built distributions from the 'dist' directory to PyPI.
          # Role-based auth (OIDC / trusted publisher) will be used if configured.
          packages-dir: dist
